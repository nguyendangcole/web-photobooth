name: 🚀 CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 📦 Setup & Dependencies
  setup:
    name: 📦 Setup Environment
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🐘 Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, pdo, pdo_mysql, gd, curl, json, openssl
        coverage: xdebug
        
    - name: 📦 Cache Composer dependencies
      uses: actions/cache@v3
      with:
        path: ~/.composer/cache/files
        key: dependencies-php-${{ hashFiles('composer.lock') }}
        restore-keys: dependencies-php-
        
    - name: 🔧 Install Composer dependencies
      run: composer install --prefer-dist --no-progress --no-suggest --optimize-autoloader

  # 🔍 Quality Checks
  quality-checks:
    name: 🔍 Quality Checks
    runs-on: ubuntu-latest
    needs: setup
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🐘 Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, pdo, pdo_mysql, gd, curl, json, openssl
        
    - name: 📦 Install dependencies
      run: composer install --prefer-dist --no-progress --no-suggest
      
    - name: 🔍 PHP Syntax Check
      run: |
        find . -name "*.php" -not -path "./vendor/*" -not -path "./node_modules/*" -exec php -l {} \;
        
    - name: 📏 Code Style Check (PHP-CS-Fixer)
      run: |
        composer global require friendsofphp/php-cs-fixer
        ~/.composer/vendor/bin/php-cs-fixer fix --dry-run --diff --verbose app/
        
    - name: 🐛 Static Analysis (PHPStan)
      run: vendor/bin/phpstan analyse app --level=1 --no-progress

  # 🐳 Docker Build
  docker-build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: [setup, quality-checks, testing]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      packages: write
      
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔐 Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: 🏷️ Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
          
    - name: 🐳 Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # 🧪 Testing
  testing:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    needs: setup
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: photobooth_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
        
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🐘 Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, pdo, pdo_mysql, gd, curl, json, openssl
        
    - name: 📦 Install dependencies
      run: composer install --prefer-dist --no-progress --no-suggest
      
    - name: 🗄️ Setup Test Database
      run: |
        mysql -h127.0.0.1 -uroot -proot -e "CREATE DATABASE IF NOT EXISTS photobooth_test;"
        
    - name: 🧪 Run PHP Unit Tests
      run: |
        if [ -f "phpunit.xml" ]; then
          vendor/bin/phpunit --coverage-clover=coverage.xml
        else
          echo "No PHPUnit tests found - skipping"
        fi
        
    - name: 📊 Upload coverage reports
      uses: codecov/codecov-action@v3
      if: always()
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  
